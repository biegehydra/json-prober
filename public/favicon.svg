<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="120" y1="80" x2="400" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Left curly brace -->
  <path d="M120 140c0-28 14-48 48-48" stroke="url(#accent)" stroke-width="28" stroke-linecap="round" fill="none"/>
  <path d="M120 372c0 28 14 48 48 48" stroke="url(#accent)" stroke-width="28" stroke-linecap="round" fill="none"/>
  <path d="M120 140v72c0 20-12 32-28 44 16 12 28 24 28 44v72" stroke="url(#accent)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Data dots -->
  <circle cx="200" cy="190" r="14" fill="#60a5fa" opacity="0.7"/>
  <circle cx="200" cy="256" r="14" fill="#60a5fa" opacity="0.5"/>
  <circle cx="200" cy="322" r="14" fill="#60a5fa" opacity="0.7"/>

  <!-- Magnifying glass -->
  <circle cx="310" cy="230" r="72" stroke="url(#accent)" stroke-width="28" fill="none"/>
  <line x1="360" y1="280" x2="420" y2="350" stroke="url(#accent)" stroke-width="32" stroke-linecap="round"/>

  <!-- Checkmark inside magnifier -->
  <polyline points="280,230 300,250 340,210" stroke="#60a5fa" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
